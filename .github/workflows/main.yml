on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      tools_make_branch:
        description: "tools-make branch"
        default: "master"
        required: true
      libs_base_branch:
        description: "libs-base branch"
        default: "master"
        required: true
      libs_gui_branch:
        description: "libs-gui branch"
        default: "master"
        required: true

jobs:
  ########### Linux ###########
  linux:
    name: ci
    runs-on: ubuntu-latest

    container:
      image: ubuntu:22.04

    # don't run pull requests from local branches twice
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository

    strategy:
      fail-fast: false
      matrix:
        include:
          - server: x11
            graphics: cairo
          - server: x11
            graphics: xlib
          - server: x11
            graphics: art
          - server: wayland
            graphics: cairo
          - server: headless
            graphics: headless

    env: 
      APT_PACKAGES: >-
        build-essential
        git
        pkg-config
        libgnutls28-dev
        libffi-dev
        libicu-dev
        libxml2-dev
        libxslt1-dev
        libssl-dev
        gnutls-bin
        libtiff-dev
        libjpeg-dev
        libgnustep-base-dev
        libfreetype-dev

      # packages for xlib runtime
      APT_PACKAGES_xlib: >-
        libxt-dev
        libxmu-dev
        libxext-dev
        xvfb

      # packages for art runtime
      APT_PACKAGES_art: >-
        libart-2.0-dev
        libxt-dev
        libxmu-dev
        libxext-dev
        xvfb

      # packages for cairo runtime
      APT_PACKAGES_cairo: >-
        libxt-dev
        libcairo2-dev
        libxmu-dev
        libxext-dev
        xvfb

      # packages for headless runtime
      APT_PACKAGES_headless: >-
        libcairo2-dev

      # extra packages for the wayland server (graphics=cairo supplies the rest)
      APT_PACKAGES_wayland: >-
        libwayland-dev
        libxkbcommon-dev
        weston
  
      DEBIAN_FRONTEND: noninteractive
      SRC_PATH: ${{ github.workspace }}/source
      DEPS_PATH: ${{ github.workspace }}/dependencies
      INSTALL_PATH: ${{ github.workspace }}/build

    steps:
      - uses: actions/checkout@v3

      - name: Install packages
        run: |
          apt-get -q -y update
          apt-get -q -y install $APT_PACKAGES $APT_PACKAGES_${{ matrix.graphics }} $APT_PACKAGES_${{ matrix.server }}

      - name: Install dependencies
        env:
          TOOLS_MAKE_BRANCH: ${{github.event.inputs.tools_make_branch}}
          LIBS_BASE_BRANCH: ${{github.event.inputs.libs_base_branch}}
          LIBS_GUI_BRANCH: ${{github.event.inputs.libs_gui_branch}}
        run: ./.github/scripts/dependencies.sh

      - name: Build source
        run: |
          . $INSTALL_PATH/share/GNUstep/Makefiles/GNUstep.sh
          ./configure --enable-server=${{ matrix.server }} --enable-graphics=${{ matrix.graphics }}
          make && make install

      - name: Run tests
        run: |
          . $INSTALL_PATH/share/GNUstep/Makefiles/GNUstep.sh
          if [ "${{ matrix.server }}" = "x11" ]; then
            xvfb-run -a make check
          elif [ "${{ matrix.server }}" = "wayland" ]; then
            export XDG_RUNTIME_DIR="$(mktemp -d)"
            chmod 700 "$XDG_RUNTIME_DIR"
            weston --backend=headless-backend.so --socket=wayland-1 --idle-time=0 &
            for i in $(seq 1 30); do
              [ -S "$XDG_RUNTIME_DIR/wayland-1" ] && break
              sleep 1
            done
            if [ ! -S "$XDG_RUNTIME_DIR/wayland-1" ]; then
              echo "weston did not create its wayland socket"
              exit 1
            fi
            export WAYLAND_DISPLAY=wayland-1
            make check
          else
            make check
          fi
